format = """
[   ](fg:base bg:pink)\

$python\
[](fg:pink bg:blue)\

$directory\
[](fg:blue bg:green)\

$git_branch\
$git_status\
[ ](fg:green bg:base)
"""

add_newline = true

palette = "catppuccin_latte"

[character]
success_symbol = "[❯](cyan)"
error_symbol = "[❯](red)"

[directory]
style = 'bg:blue fg:surface0'
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:green fg:surface0"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:green fg:surface0"
format = '[$all_status$ahead_behind ]($style)'

[docker_context]
symbol = " "
style = "bg:sky"
format = '[ $symbol $context ]($style)'

[time]
disabled = true
time_format = "%R"             # Hour:Minute Format
style = "bg:#33658A"
format = '[ ♥ $time ]($style)'

# LANGUAGES
[python]
style = "bold bg:pink fg:surface0"
format = '[  $virtualenv ]($style)'

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo = "#dd7878"
pink = "#ea76cb"
mauve = "#8839ef"
red = "#d20f39"
maroon = "#e64553"
peach = "#fe640b"
yellow = "#df8e1d"
green = "#40a02b"
teal = "#179299"
sky = "#04a5e5"
sapphire = "#209fb5"
blue = "#1e66f5"
lavender = "#7287fd"
text = "#4c4f69"
subtext1 = "#5c5f77"
subtext0 = "#6c6f85"
overlay2 = "#7c7f93"
overlay1 = "#8c8fa1"
overlay0 = "#9ca0b0"
surface2 = "#acb0be"
surface1 = "#bcc0cc"
surface0 = "#ccd0da"
base = "#eff1f5"
mantle = "#e6e9ef"
crust = "#dce0e8"
